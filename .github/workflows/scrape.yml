name: Scrape Prices

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scripts/scraper.py

      - name: Commit if changed
        run: |
          git config user.email "pricebot@pakpc.local"
          git config user.name  "PakPC Price Bot"
          git add data/prices.json data/price_history.json
          git diff --cached --quiet || \
            git commit -m "chore: prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
